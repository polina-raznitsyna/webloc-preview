name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release --arch ${{ matrix.arch }}
      - name: Rename binary
        run: cp .build/release/webloc-preview webloc-preview-${{ matrix.arch }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: webloc-preview-${{ matrix.arch }}
          path: webloc-preview-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            webloc-preview-arm64/webloc-preview-arm64
            webloc-preview-x86_64/webloc-preview-x86_64
